    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>

      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="js/dropdown.js"></script>
    <script src="js/cart.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // 1. GENERATE ORDER NUMBER
        const orderNumberElement = document.getElementById("order-number");
        const customID =
          "Samie Records-" +
          Math.random().toString(36).substring(2, 9).toUpperCase();
        if (orderNumberElement)
          orderNumberElement.innerText = "Order Nº " + customID;

        // 2. PRODUCT DATABASE
        const myProducts = [
          {
            name: "Afro Essentials - Guitar Loop Packs",
            downloadUrl:
              "https://drive.google.com/drive/folders/1_5cGQJ-40fuigSrao_JRNFP7GwYEzW0g?usp=sharing",
          },
          {
            name: "Afro Essentials - Drum Loops",
            downloadUrl:
              "https://drive.google.com/drive/folders/YOUR_FOLDER_ID_2",
          },
          {
            name: "AfroBeats Packs - Ultimate Bundle Vol 1",
            downloadUrl:
              "https://drive.google.com/file/d/YOUR_FILE_ID_3/view?usp=sharing",
          },
          {
            name: "Vocals Bundle",
            downloadUrl:
              "https://drive.google.com/file/d/1tKSD_VpDOfg-dIB0J4w5zGEarqDFouYe/view?usp=sharing",
          },
          {
            name: "Sample Packs",
            downloadUrl:
              "https://drive.google.com/file/d/19xCLToykmby2lTjgkSR9CnKJjBqVy7qR/view?usp=sharing",
          },
        ];

        // 3. DOWNLOAD LOGIC
        const parentAnchor = document.getElementById("download-link-anchor");
        const seeDownloadBtn = document.querySelector(".details-btn");

        const rawCart =
          localStorage.getItem("last_purchase") ||
          localStorage.getItem("jlk_cart");
        const cart = JSON.parse(rawCart) || [];

        // Check if cart has items
        if (cart.length > 0 && parentAnchor) {
          const lastItem = cart[cart.length - 1];
          const purchasedName = lastItem.name.toLowerCase().trim();

          const match = myProducts.find((p) => {
            const dbName = p.name.toLowerCase().trim();
            return (
              dbName === purchasedName ||
              dbName.includes(purchasedName) ||
              purchasedName.includes(dbName)
            );
          });

          if (match && match.downloadUrl) {
            // SUCCESS CASE: Item found in database
            parentAnchor.href = match.downloadUrl;
            parentAnchor.setAttribute("target", "_blank");
            seeDownloadBtn.innerText = "DOWNLOAD NOW";
            seeDownloadBtn.style.backgroundColor = "#28a745";
          } else {
            // SEMI-FAILURE: Item in cart but link missing in database
            parentAnchor.href = "index.html";
            seeDownloadBtn.innerText = "BACK TO SHOPPING";
            seeDownloadBtn.style.backgroundColor = "#666"; // Grey for neutral
          }
        } else {
          // FAILURE CASE: No cart found at all (cart is empty)
          if (parentAnchor) {
            parentAnchor.href = "index.html";
            seeDownloadBtn.innerText = "BACK TO SHOPPING";
            seeDownloadBtn.style.backgroundColor = "#000"; // Black or your brand color
          }
        }

        // 4. CLEANUP (Wait 30 seconds, then clear everything)
        setTimeout(() => {
          localStorage.removeItem("jlk_cart");
          localStorage.removeItem("last_purchase");
          const cartCount = document.querySelector(".cart-count");
          if (cartCount) cartCount.innerText = "0";
        }, 30000);
      });
    </script>
